app = "english-rhythm-coach-api"
primary_region = "sin"

[build]
dockerfile = "Dockerfile"

[env]
DATABASE_URL = "sqlite:////data/app.db"
LOG_LEVEL = "INFO"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[http_service.concurrency]
type = "requests"
soft_limit = 20
hard_limit = 25

[[http_service.checks]]
grace_period = "20s"
interval = "30s"
method = "GET"
timeout = "5s"
path = "/health"

[[mounts]]
source = "api_data"
destination = "/data"
